modules:
  jira:issueContext:
    - key: proxytrace-forge-hello-world-panel
      resource: main
      resolver:
        function: resolver
      title: proxytrace-forge
      label: ProxyTrace
      icon: https://developer.atlassian.com/platform/forge/images/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: ../frontend-v2/dist
permissions:
  scopes:
    - read:jira-work
  external:
    fetch:
      client:
        - address: 'https://proxytrace.onrender.com'
      backend:
        - address: 'https://proxytrace.onrender.com'
app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/1374ee63-63d0-43f3-b5ee-e6623ae3e272
