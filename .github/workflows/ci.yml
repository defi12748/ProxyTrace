name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-and-frontend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: proxytrace
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d proxytrace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/proxytrace

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Apply migrations
        run: python -m alembic upgrade head

      - name: Run backend tests
        run: python -m pytest -q

      - name: Build frontend
        run: npm --prefix frontend-v2 ci && npm --prefix frontend-v2 run build
