[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# The database URL is NOT read from this file.
# It is loaded at runtime from the DATABASE_URL environment variable
# via proxytrace.settings.get_settings().async_database_url in migrations/env.py.
# This key is kept as a placeholder so Alembic's config parser does not error.
sqlalchemy.url = postgresql+asyncpg://placeholder/proxytrace

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
