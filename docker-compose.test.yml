services:
  postgres:
    image: postgres:16-alpine
    container_name: proxytrace-test-postgres
    environment:
      POSTGRES_DB: proxytrace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proxytrace"]
      interval: 5s
      timeout: 5s
      retries: 12
    tmpfs:
      - /var/lib/postgresql/data
