services:
  - type: web
    name: proxytrace-api
    runtime: python
    buildCommand: pip install -e . && alembic upgrade head
    startCommand: uvicorn proxytrace.proxy.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PROXYTRACE_API_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: REDACTION_ENABLED
        value: "true"
      - key: DEMO_TOOL_MODE
        value: "true"
