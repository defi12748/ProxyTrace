services:
  - type: web
    name: proxytrace-api
    runtime: python
    plan: free
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn proxytrace.proxy.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: REDACTION_ENABLED
        value: "true"
      - key: DEMO_TOOL_MODE
        value: "false"
      - key: ATLASSIAN_SITE_URL
        sync: false
      - key: ATLASSIAN_EMAIL
        sync: false
      - key: ATLASSIAN_API_TOKEN
        sync: false
      - key: ATLASSIAN_PROJECT_KEY
        sync: false
